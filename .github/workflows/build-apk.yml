name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout old project
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.5"
          channel: "stable"

      - name: Create fresh Flutter project
        run: |
          cd ..
          flutter create -t app charm_fixed

      - name: Copy project files
        run: |
          cp -r lib ../charm_fixed/
          cp pubspec.yaml ../charm_fixed/
          if [ -d assets ]; then cp -r assets ../charm_fixed/; fi

      - name: Install dependencies
        run: flutter pub get
        working-directory: ../charm_fixed

      - name: Build APK
        run: flutter build apk --release
        working-directory: ../charm_fixed

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: charm-release-apk
          path: ../charm_fixed/build/app/outputs/flutter-apk/app-release.apk
